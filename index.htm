<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sajilo Sathi — MSCSLM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d0f12;
    --bg2:       #13161b;
    --bg3:       #1a1e25;
    --bg4:       #22272f;
    --border:    rgba(255,255,255,0.07);
    --border2:   rgba(255,255,255,0.12);
    --accent:    #3ecf8e;
    --accent-dim:#1a6e4a;
    --accent-glow: rgba(62,207,142,0.15);
    --text:      #e8eaed;
    --text2:     #8b9099;
    --text3:     #555c67;
    --user-bg:   #1e3a2e;
    --user-border: rgba(62,207,142,0.3);
    --bot-bg:    #1a1e25;
    --red:       #f87171;
    --font: 'Sora', sans-serif;
    --mono: 'JetBrains Mono', monospace;
    --radius: 12px;
    --sidebar-w: 260px;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100vh;
    transition: transform 0.25s ease;
    z-index: 100;
  }

  .sidebar-head {
    padding: 20px 16px 16px;
    border-bottom: 1px solid var(--border);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .brand-icon {
    width: 34px; height: 34px;
    background: var(--accent);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600;
    color: #041a0e;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  .brand-name {
    font-size: 14px; font-weight: 600;
    color: var(--text);
    line-height: 1.2;
  }

  .brand-sub {
    font-size: 10px;
    color: var(--text3);
    font-family: var(--mono);
    letter-spacing: 0.5px;
  }

  .btn-new {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text2);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: var(--font);
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: all 0.15s;
  }
  .btn-new:hover { background: var(--bg4); color: var(--text); border-color: var(--border2); }
  .btn-new svg { color: var(--accent); flex-shrink: 0; }

  .sidebar-label {
    padding: 16px 16px 6px;
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .session-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px;
  }

  .session-empty {
    padding: 12px 8px;
    font-size: 12px;
    color: var(--text3);
    text-align: center;
  }

  .session-item {
    width: 100%;
    background: transparent;
    border: none;
    border-radius: 8px;
    padding: 9px 10px;
    cursor: pointer;
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 3px;
    transition: background 0.12s;
    margin-bottom: 2px;
  }
  .session-item:hover { background: var(--bg3); }
  .session-item.active { background: var(--bg4); }

  .session-item-title {
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: flex; align-items: center; gap: 6px;
  }
  .session-item-title svg { color: var(--text3); flex-shrink: 0; }
  .session-item-time {
    font-size: 10px;
    color: var(--text3);
    font-family: var(--mono);
  }

  .sidebar-foot {
    padding: 12px 8px;
    border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 6px;
  }

  .session-ts {
    font-size: 10px;
    color: var(--text3);
    font-family: var(--mono);
    padding: 0 8px;
    display: flex; align-items: center; gap: 5px;
  }

  .btn-clear {
    width: 100%;
    background: transparent;
    border: 1px solid transparent;
    color: var(--text3);
    border-radius: 8px;
    padding: 7px 10px;
    font-family: var(--font);
    font-size: 12px;
    cursor: pointer;
    display: flex; align-items: center; gap: 7px;
    transition: all 0.15s;
  }
  .btn-clear:hover { background: rgba(248,113,113,0.08); color: var(--red); border-color: rgba(248,113,113,0.2); }

  /* ── Main ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* ── Header ── */
  .chat-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg2);
    flex-shrink: 0;
  }

  .header-left { display: flex; align-items: center; gap: 12px; }

  .header-avatar {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
    color: #041a0e;
  }

  .header-title { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.2; }
  .header-status {
    font-size: 11px; color: var(--accent);
    display: flex; align-items: center; gap: 5px;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .version-badge {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    background: var(--accent-glow);
    border: 1px solid rgba(62,207,142,0.2);
    padding: 3px 8px;
    border-radius: 6px;
    letter-spacing: 0.05em;
  }

  .sidebar-toggle {
    display: none;
    background: none;
    border: none;
    color: var(--text2);
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
  }
  .sidebar-toggle:hover { color: var(--text); background: var(--bg3); }

  /* ── Messages ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ── Welcome ── */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    text-align: center;
    padding: 40px 20px;
    gap: 12px;
  }

  .welcome-icon {
    width: 60px; height: 60px;
    background: var(--accent);
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 600;
    color: #041a0e;
    margin-bottom: 8px;
    box-shadow: 0 0 40px var(--accent-glow);
  }

  .welcome h2 {
    font-size: 22px; font-weight: 600;
    color: var(--text);
  }

  .welcome p {
    font-size: 14px;
    color: var(--text2);
    max-width: 380px;
    line-height: 1.7;
  }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 8px;
    max-width: 500px;
  }

  .chip {
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text2);
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 12px;
    font-family: var(--font);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .chip:hover {
    background: var(--accent-glow);
    border-color: rgba(62,207,142,0.35);
    color: var(--accent);
  }

  /* ── Message rows ── */
  .msg-row {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.2s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-row--user {
    flex-direction: row-reverse;
  }

  .avatar-sm {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .avatar-sm.bot { background: var(--accent); color: #041a0e; }
  .avatar-sm.user { background: var(--bg4); color: var(--text2); }

  .msg-group { display: flex; flex-direction: column; gap: 4px; max-width: 70%; }
  .msg-row--user .msg-group { align-items: flex-end; }

  .bubble {
    padding: 11px 14px;
    border-radius: 12px;
    font-size: 13.5px;
    line-height: 1.65;
    word-break: break-word;
  }
  .bubble--bot {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-top-left-radius: 4px;
  }
  .bubble--user {
    background: var(--user-bg);
    border: 1px solid var(--user-border);
    color: var(--text);
    border-top-right-radius: 4px;
  }

  .bubble-actions {
    margin-top: 8px;
    display: flex; gap: 6px;
  }

  .copy-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text3);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 11px;
    font-family: var(--font);
    cursor: pointer;
    display: flex; align-items: center; gap: 4px;
    transition: all 0.12s;
  }
  .copy-btn:hover { border-color: var(--border2); color: var(--text2); }

  .msg-time {
    font-size: 10px;
    color: var(--text3);
    font-family: var(--mono);
    padding: 0 2px;
  }

  .sim-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10px; font-family: var(--mono);
    margin-top: 6px;
    padding: 2px 8px;
    border-radius: 5px;
  }
  .sim-badge .dot { width: 5px; height: 5px; border-radius: 50%; }
  .sim-badge.high { background: rgba(62,207,142,0.1); color: #3ecf8e; }
  .sim-badge.high .dot { background: #3ecf8e; }
  .sim-badge.mid  { background: rgba(250,182,72,0.1);  color: #fab648; }
  .sim-badge.mid  .dot { background: #fab648; }
  .sim-badge.low  { background: rgba(248,113,113,0.1); color: #f87171; }
  .sim-badge.low  .dot { background: #f87171; }

  /* ── Typing ── */
  .typing-bar {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 0 20px 12px;
    flex-shrink: 0;
  }
  .typing-bar.visible { display: flex; }

  .typing-dots {
    display: flex; gap: 4px;
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
  }
  .typing-dots span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--text3);
    animation: bounce 1.2s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40%           { transform: translateY(-5px); opacity: 1; }
  }

  /* ── Input ── */
  .input-area {
    padding: 12px 20px 16px;
    border-top: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 4px 4px 4px 14px;
    transition: border-color 0.15s;
  }
  .input-row:focus-within {
    border-color: rgba(62,207,142,0.4);
    box-shadow: 0 0 0 3px rgba(62,207,142,0.06);
  }

  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 13.5px;
    padding: 8px 0;
  }
  #user-input::placeholder { color: var(--text3); }
  #user-input:disabled { opacity: 0.4; }

  #send-button {
    width: 36px; height: 36px;
    background: var(--accent);
    border: none;
    border-radius: 9px;
    color: #041a0e;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  #send-button:hover { background: #5ad9a0; transform: scale(1.04); }
  #send-button:active { transform: scale(0.97); }
  #send-button:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  .input-hint {
    font-size: 10px;
    color: var(--text3);
    font-family: var(--mono);
    text-align: center;
    margin-top: 8px;
  }
  .input-hint kbd {
    background: var(--bg4);
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 1px 5px;
    font-family: var(--mono);
    font-size: 10px;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: var(--bg4);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 9px 18px;
    border-radius: 10px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: all 0.2s ease;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Mobile ── */
  @media (max-width: 700px) {
    .sidebar {
      position: fixed; left: 0; top: 0; bottom: 0;
      transform: translateX(-100%);
    }
    .sidebar.open { transform: translateX(0); box-shadow: 4px 0 24px rgba(0,0,0,0.5); }
    .sidebar-toggle { display: flex; }
    .msg-group { max-width: 85%; }
  }
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-head">
    <div class="brand">
      <div class="brand-icon">SS</div>
      <div>
        <div class="brand-name">Sajilo Sathi</div>
        <div class="brand-sub">MSCSLM</div>
      </div>
    </div>
    <button class="btn-new" id="new-chat-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New conversation
    </button>
  </div>

  <div class="sidebar-label">Recent</div>
  <div class="session-list" id="session-list">
    <div class="session-empty">No sessions yet</div>
  </div>

  <div class="sidebar-foot">
    <div class="session-ts" id="session-meta">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span id="session-start-label">No active session</span>
    </div>
    <button class="btn-clear" id="clear-history-btn">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M9 6V4h6v2"/></svg>
      Clear all history
    </button>
  </div>
</aside>

<main class="main">
  <header class="chat-header">
    <div class="header-left">
      <button class="sidebar-toggle" id="sidebar-toggle">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="header-avatar">SS</div>
      <div>
        <div class="header-title">Sajilo Sathi</div>
        <div class="header-status">
          <span class="status-dot"></span>
          Online · Child Safety &amp; Support
        </div>
      </div>
    </div>
    <span class="version-badge">MSCSLM v1</span>
  </header>

  <div class="messages" id="chat-messages">
    <div class="welcome" id="welcome-screen">
      <div class="welcome-icon">SS</div>
      <h2>Hi, I'm Sajilo Sathi 👋</h2>
      <p>Your guide to child safety, support services, and local resources in Nepal. Ask me anything.</p>
      <div class="chips">
        <button class="chip" data-msg="child abuse Kathmandu">Child Abuse — Kathmandu</button>
        <button class="chip" data-msg="scam report">Report a Scam</button>
        <button class="chip" data-msg="mental health support">Mental Health Support</button>
        <button class="chip" data-msg="emergency contacts Nepal">Emergency Contacts</button>
        <button class="chip" data-msg="child labour">Child Labour Help</button>
        <button class="chip" data-msg="hello">Say Hello 👋</button>
      </div>
    </div>
  </div>

  <div class="typing-bar" id="typing-bar" aria-hidden="true">
    <div class="avatar-sm bot">SS</div>
    <div class="typing-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <input type="text" id="user-input" placeholder="Ask me anything…" autocomplete="off" aria-label="Chat message input" />
      <button id="send-button" type="button" title="Send (Enter)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <p class="input-hint"><kbd>Enter</kbd> to send &nbsp;·&nbsp; <kbd>Ctrl+K</kbd> to focus</p>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const SESSION_KEY = 'sajilo_sessions';
const TYPING_DELAY_BASE = 900;
const TYPING_DELAY_VARIANCE = 400;
const MATCH_THRESHOLD = 20;

let responses = null;
let currentSessionId = null;
let currentMessages = [];
let allSessions = [];

const chatMessages    = document.getElementById('chat-messages');
const welcomeScreen   = document.getElementById('welcome-screen');
const userInput       = document.getElementById('user-input');
const sendButton      = document.getElementById('send-button');
const typingBar       = document.getElementById('typing-bar');
const sessionList     = document.getElementById('session-list');
const sessionStartLbl = document.getElementById('session-start-label');
const newChatBtn      = document.getElementById('new-chat-btn');
const clearHistoryBtn = document.getElementById('clear-history-btn');
const sidebarToggle   = document.getElementById('sidebar-toggle');
const sidebar         = document.getElementById('sidebar');
const toast           = document.getElementById('toast');

function formatTime(d) {
  return new Date(d).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
function formatDate(d) {
  const date = new Date(d), today = new Date();
  if (date.toDateString() === today.toDateString()) return 'Today ' + formatTime(d);
  return date.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' ' + formatTime(d);
}
function shortId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('visible');
  setTimeout(() => toast.classList.remove('visible'), 2200);
}
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function loadSessions() {
  try { allSessions = JSON.parse(localStorage.getItem(SESSION_KEY) || '[]'); }
  catch(_) { allSessions = []; }
}
function saveSessions() { localStorage.setItem(SESSION_KEY, JSON.stringify(allSessions)); }
function getSessionIndex() { return allSessions.findIndex(s => s.id === currentSessionId); }

function persistCurrentSession() {
  if (!currentSessionId) return;
  const idx = getSessionIndex();
  const raw = currentMessages.find(m => m.role === 'user')?.text || 'New Chat';
  const title = raw.length > 40 ? raw.slice(0,40) + '…' : raw;
  const session = { id: currentSessionId, title, messages: currentMessages, createdAt: currentMessages[0]?.timestamp || new Date().toISOString() };
  if (idx >= 0) allSessions[idx] = session; else allSessions.unshift(session);
  saveSessions();
  renderSessionList();
}

function startNewSession() {
  currentSessionId = shortId();
  currentMessages = [];
  welcomeScreen.style.display = '';
  Array.from(chatMessages.children).forEach(el => { if (!el.classList.contains('welcome')) el.remove(); });
  sessionStartLbl.textContent = 'Just started';
  renderSessionList();
}

function loadSession(session) {
  currentSessionId = session.id;
  currentMessages = session.messages || [];
  Array.from(chatMessages.children).forEach(el => { if (!el.classList.contains('welcome')) el.remove(); });
  welcomeScreen.style.display = 'none';
  currentMessages.forEach(m => renderMessage(m, false));
  chatMessages.scrollTop = chatMessages.scrollHeight;
  sessionStartLbl.textContent = formatDate(session.createdAt);
  renderSessionList();
}

function renderSessionList() {
  sessionList.innerHTML = '';
  if (allSessions.length === 0) {
    sessionList.innerHTML = '<div class="session-empty">No sessions yet</div>';
    return;
  }
  allSessions.slice(0,20).forEach(session => {
    const btn = document.createElement('button');
    btn.className = 'session-item' + (session.id === currentSessionId ? ' active' : '');
    btn.title = session.title;
    btn.innerHTML = `
      <div class="session-item-title">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        ${escHtml(session.title)}
      </div>
      <div class="session-item-time">${formatDate(session.createdAt)}</div>
    `;
    btn.addEventListener('click', () => {
      loadSession(session);
      if (window.innerWidth < 700) sidebar.classList.remove('open');
    });
    sessionList.appendChild(btn);
  });
}

function renderMessage(msgObj, animate = true) {
  const { role, text, similarity, timestamp } = msgObj;
  welcomeScreen.style.display = 'none';

  const row = document.createElement('div');
  row.className = 'msg-row ' + (role === 'user' ? 'msg-row--user' : 'msg-row--bot');

  if (role === 'bot') {
    let simBadge = '';
    if (similarity !== undefined) {
      const pct = Math.min(100, Math.max(0, Math.round(similarity)));
      const cls = pct >= 65 ? 'high' : pct >= 35 ? 'mid' : 'low';
      const label = pct >= 65 ? 'High match' : pct >= 35 ? 'Partial match' : 'Low match';
      simBadge = `<div class="sim-badge ${cls}"><span class="dot"></span>${label} · ${pct}%</div>`;
    }
    row.innerHTML = `
      <div class="avatar-sm bot">SS</div>
      <div class="msg-group">
        <div class="bubble bubble--bot">
          <div>${escHtml(text)}</div>
          ${simBadge}
          <div class="bubble-actions">
            <button class="copy-btn">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              Copy
            </button>
          </div>
        </div>
        <span class="msg-time">${formatTime(timestamp)}</span>
      </div>
    `;
    row.querySelector('.copy-btn').addEventListener('click', () => {
      navigator.clipboard.writeText(text).then(() => showToast('Copied!')).catch(() => showToast('Copy failed'));
    });
  } else {
    row.innerHTML = `
      <div class="msg-group">
        <div class="bubble bubble--user">${escHtml(text)}</div>
        <span class="msg-time">${formatTime(timestamp)}</span>
      </div>
      <div class="avatar-sm user">U</div>
    `;
  }

  chatMessages.appendChild(row);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

// ── NLP ──
const ignoreWords = ["what","is","the","who","nepal's","streets","metropolitan","mom","i","saw","his","ward","no"];
const spellingMistakes = {
  'kid':'child','scammed':'scam','scamed':'scam','father':'elder',
  'beating':'abuse','beat':'abuse','mother':'elder','abusing':'abuse',
  'hi':'hello','hey':'hello','helo':'hello',
};

function normalizeInput(input) {
  return input.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,' ').toLowerCase();
}
function correctSpelling(query) {
  return query.split(' ').map(w => spellingMistakes[w.toLowerCase()] || w).join(' ');
}
function calculateSimilarity(str1, str2) {
  const words1 = str1.split(' ').filter(w => !ignoreWords.includes(w.toLowerCase()));
  const words2 = str2.split(' ').filter(w => !ignoreWords.includes(w.toLowerCase()));
  const commonWords = words1.filter(w => words2.includes(w)).length;
  const simWords = (commonWords / Math.max(words1.length, words2.length)) * 100;
  const seqSim = calcSeqSim(str1, str2);
  const lenDiff = 100 - (Math.abs(str1.length - str2.length) * 3);
  const firstLetter = str1.charAt(0) === str2.charAt(0) ? 100 : 0;
  const lastLetter  = str1.charAt(str1.length-1) === str2.charAt(str2.length-1) ? 100 : 0;
  return (simWords * 0.45) + (seqSim * 0.39) + (lenDiff * 0.01) + (firstLetter * 0.05) + (lastLetter * 0.10);
}
function calcSeqSim(s1, s2) {
  const max = Math.max(s1.length, s2.length);
  let sim = 0;
  for (let i = 0; i < max; i++) if (s1[i] === s2[i]) sim += 1/max;
  return sim * 100;
}

function search(query) {
  const corrected  = correctSpelling(query);
  const normalized = normalizeInput(corrected.trim().toUpperCase());
  const scored = Object.keys(responses).map(key => ({
    query: key,
    similarity: calculateSimilarity(normalized, normalizeInput(key.toUpperCase()))
  }));
  scored.sort((a,b) => b.similarity - a.similarity);

  // Console log the top result
  console.log(`[Sajilo Sathi] "${query}" → "${scored[0].query}" (${scored[0].similarity.toFixed(1)}%)`);

  return scored.slice(0,1);
}

function sendMessage() {
  const text = userInput.value.trim();
  if (!text || !responses) return;
  userInput.value = '';
  userInput.focus();

  if (!currentSessionId) startNewSession();

  const now = new Date().toISOString();
  const userMsg = { role:'user', text, timestamp: now };
  currentMessages.push(userMsg);
  renderMessage(userMsg);
  showTyping();

  setTimeout(() => {
    hideTyping();
    const results = search(text);
    results.forEach(result => {
      const botText = result.similarity >= MATCH_THRESHOLD
        ? (responses[result.query] || 'Sorry, I could not find a good answer for that.')
        : "I'm not sure I understand that. Could you rephrase? Try something like 'child abuse', 'emergency contacts', or 'mental health'.";
      const botMsg = { role:'bot', text: botText, similarity: result.similarity, timestamp: new Date().toISOString() };
      currentMessages.push(botMsg);
      renderMessage(botMsg);
    });
    persistCurrentSession();
  }, TYPING_DELAY_BASE + Math.random() * TYPING_DELAY_VARIANCE);
}

function showTyping() { typingBar.classList.add('visible'); }
function hideTyping()  { typingBar.classList.remove('visible'); }

userInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.isComposing) { e.preventDefault(); sendMessage(); }
});
sendButton.addEventListener('click', sendMessage);

newChatBtn.addEventListener('click', () => {
  if (currentMessages.length > 0) persistCurrentSession();
  startNewSession();
  if (window.innerWidth < 700) sidebar.classList.remove('open');
});

clearHistoryBtn.addEventListener('click', () => {
  if (!confirm('Clear all chat history? This cannot be undone.')) return;
  allSessions = [];
  saveSessions();
  startNewSession();
  renderSessionList();
  showToast('History cleared');
});

sidebarToggle.addEventListener('click', () => sidebar.classList.toggle('open'));

document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    userInput.value = chip.dataset.msg;
    sendMessage();
  });
});

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); userInput.focus(); }
});

(function init() {
  loadSessions();
  renderSessionList();
  if (allSessions.length > 0) loadSession(allSessions[0]);
  else startNewSession();

  fetch('responses.json')
    .then(r => r.json())
    .then(data => {
      responses = data;
      userInput.disabled = false;
      sendButton.disabled = false;
      userInput.placeholder = 'Ask me anything…';
    })
    .catch(() => {
      userInput.placeholder = 'Could not load data. Please refresh.';
    });

  userInput.disabled = true;
  sendButton.disabled = true;
  userInput.placeholder = 'Loading knowledge base…';
})();
</script>
